<script>
const firebaseConfig = {
    apiKey: "AIzaSyC84uXf-fxi3QgQthh1YguzWcb9dRrs3RI",
    authDomain: "dynasty-8-fb-fa.firebaseapp.com",
    projectId: "dynasty-8-fb-fa",
    storageBucket: "dynasty-8-fb-fa.firebasestorage.app",
    messagingSenderId: "996866876620",
    appId: "1:996866876620:web:e166b5da85cece41660e69"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function dynastyApp() {
    return {
        isLoggedIn: false,
        inService: false,
        email: '', pass: '',
        currentTheme: 'dark',
        currentUser: { name: 'Agent', grade: 'Agent', role: 'agent' },
        properties: [
            {n: 'Motel', s: 0, l: 2625}, {n: 'Trailer', s: 0, l: 2625},
            {n: 'House 1', s: 43750, l: 5250}, {n: 'House 2', s: 61250, l: 8750},
            {n: 'House 3', s: 262500, l: 13125}, {n: 'House 4', s: 262500, l: 13125},
            {n: 'House 5', s: 262500, l: 13125}, {n: 'House 6', s: 210000, l: 10500},
            {n: 'House 7', s: 210000, l: 10500}, {n: 'House 8', s: 210000, l: 10500},
            {n: 'Lester', s: 43750, l: 5250}, {n: 'Flat 1', s: 52500, l: 7000},
            {n: 'Flat 2', s: 35000, l: 4375}, {n: 'Flat 3', s: 61250, l: 7000},
            {n: 'Villa 1 à 9', s: 1750000, l: 175000}, {n: 'Villa 10', s: 3500000, l: 175000},
            {n: 'Villa 11', s: 3500000, l: 175000}, {n: 'Ranch', s: 6125000, l: 175000},
            {n: 'Duplex', s: 875000, l: 87500}, {n: 'Penthouse', s: 7000000, l: 262500},
            {n: 'Petit Entrepôt', s: 0, l: 8750}, {n: 'Entrepôt Moyen', s: 0, l: 17500},
            {n: 'Grand Entrepôt', s: 262500, l: 61250}, {n: 'Plantation', s: 50000, l: 0},
            {n: 'Office 1', s: 35700, l: 3500}, {n: 'Office 2', s: 1400000, l: 70000},
            {n: 'Office 3', s: 1400000, l: 70000}, {n: 'Office 4', s: 1400000, l: 70000},
            {n: 'Office 5', s: 1400000, l: 70000}, {n: 'Office 6', s: 35700, l: 3500},
            {n: 'Headquarter', s: 3500000, l: 175000}, {n: 'Biker', s: 525000, l: 26250},
            {n: 'Bar', s: 700000, l: 35000}, 
            // Liste des Garages pour Recherche de prix
            {n: 'Garage 2 places', s: 26250, l: 1750}, 
            {n: 'Garage 6 places', s: 78750, l: 5250},
            {n: 'Garage 10 places', s: 131250, l: 8750}, 
            {n: 'Garage 10 places VIP', s: 131250, l: 8750},
            {n: 'Garage 20 places VIP', s: 262500, l: 17500}, 
            {n: 'Garage 25 places VIP', s: 306250, l: 21875},
        ],
        form: {
            client: '', phone: '', propId: '',
            garage: false, garageType: '2', vip: false,
            isEntreprise: false, type: 'achat', weeks: 1
        },

        login() {
            auth.signInWithEmailAndPassword(this.email, this.pass)
                .then(async (user) => {
                    const doc = await db.collection("users").doc(user.user.email).get();
                    if(doc.exists) {
                        this.currentUser = doc.data();
                    }
                    this.isLoggedIn = true;
                }).catch(err => alert("Erreur: " + err.message));
        },

        toggleService() {
            this.inService = !this.inService;
            if(!this.inService) {
                // Reset formulaire quand on quitte le service
                this.form.client = '';
                this.form.propId = '';
            }
        },

        getPropPrice() {
            let p = this.properties[this.form.propId];
            if(!p) return 0;
            return this.form.type === 'achat' ? (p.s || 0) : (p.l || 0);
        },

        getGaragePrice() {
            if(!this.form.garage) return 0;
            
            // Mapping des types de garage avec les objets de la liste properties
            const garageMap = {
                "2": "Garage 2 places",
                "6": "Garage 6 places",
                "10": "Garage 10 places",
                "10vip": "Garage 10 places VIP",
                "20": "Garage 20 places VIP",
                "25": "Garage 25 places VIP"
            };

            const garageName = garageMap[this.form.garageType];
            const p = this.properties.find(item => item.n === garageName);
            
            if(!p) return 0;
            return this.form.type === 'achat' ? (p.s || 0) : (p.l || 0);
        },

        calculateFinal() {
            let total = this.getPropPrice() + this.getGaragePrice();
            if(this.form.vip) total *= 0.95;
            return Math.round(total);
        },

        saveSale() {
            if(!this.inService) return alert("Prenez votre service !");
            if(!this.form.client || !this.form.propId) return alert("Veuillez remplir les informations client et choisir un bien.");
            
            db.collection("ventes").add({
                agent: this.currentUser.name,
                client: this.form.client,
                total: this.calculateFinal(),
                type: this.form.type,
                date: new Date().toLocaleString()
            }).then(() => {
                alert("Vente enregistrée avec succès !");
            });
        },

        logout() { 
            this.inService = false;
            this.isLoggedIn = false; 
        }
    }
}
</script>
